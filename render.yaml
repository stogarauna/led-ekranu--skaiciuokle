databases:
  - name: led-ekranu-users-db
    databaseName: led_ekranu_users
    user: led_ekranu_admin
    plan: free
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: led-ekranu-skaiciuokle
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: node server/auth-server.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SERVER_HOST
        value: 0.0.0.0
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: led-ekranu-users-db
          property: connectionString